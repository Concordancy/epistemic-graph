<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epistemic Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --text: #d4d4d4; --muted: #555; --accent: #a0c4ff;
      --open-q: #ff9e64; --stance: #a0c4ff; --conclusion: #b9f2a1;
      --tool: #c9b1ff; --implication: #ffd6a5; --glossary: #89d4cf;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Landing ── */
    #landing { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; height: 100vh; padding: 2rem; }
    #landing h1 { font-size: 0.7rem; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; }
    #objects-list { display: flex; flex-direction: column; gap: 0.8rem; max-width: 600px; width: 100%; }
    .object-card { border: 1px solid var(--border); padding: 1.4rem 1.8rem; cursor: pointer; transition: border-color 0.15s; }
    .object-card:hover { border-color: var(--accent); }
    .object-card h2 { font-size: 1rem; color: var(--accent); margin-bottom: 0.4rem; }
    .object-card p { color: var(--muted); font-size: 0.8rem; line-height: 1.6; }
    .new-btn { background: none; border: 1px dashed var(--border); color: var(--muted); padding: 0.9rem; cursor: pointer; font-family: inherit; font-size: 0.8rem; width: 100%; max-width: 600px; letter-spacing: 0.1em; transition: border-color 0.15s, color 0.15s; }
    .new-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── App ── */
    #app { display: none; flex-direction: column; height: 100vh; }
    #topbar { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; height: 44px; }
    #back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.1em; }
    #back-btn:hover { color: var(--text); }
    #obj-name { font-size: 0.85rem; color: var(--accent); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.7rem; letter-spacing: 0.1em; padding: 0.3rem 0.7rem; border-bottom: 2px solid transparent; text-transform: uppercase; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    #node-count { font-size: 0.65rem; color: var(--muted); margin-left: auto; }

    /* ── Main ── */
    #main { display: flex; flex: 1; overflow: hidden; position: relative; }
    #graph-container { flex: 1; }
    #graph-container canvas { display: block; }

    /* ── Legend ── */
    #legend { position: absolute; top: 1rem; left: 1rem; display: flex; flex-direction: column; gap: 0.35rem; pointer-events: none; }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.65rem; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Detail panel ── */
    #detail { width: 340px; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.18s; flex-shrink: 0; }
    #detail.hidden { width: 0; border: none; overflow: hidden; }
    #detail-header { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; align-items: flex-start; }
    #detail-badge { font-size: 0.6rem; padding: 0.2rem 0.5rem; border: 1px solid; letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; margin-top: 2px; border-radius: 2px; }
    #detail-title { flex: 1; background: none; border: none; color: var(--accent); font-family: inherit; font-size: 0.88rem; resize: none; outline: none; line-height: 1.4; }
    #detail-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; flex-shrink: 0; }
    #detail-body { flex: 1; overflow-y: auto; padding: 0.9rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .field-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.25rem; }
    .field-val { font-size: 0.8rem; line-height: 1.6; color: var(--text); background: var(--surface); border: 1px solid var(--border); padding: 0.5rem; font-family: inherit; resize: vertical; min-height: 55px; width: 100%; outline: none; }
    .field-val:focus { border-color: var(--accent); }
    .edges-list { display: flex; flex-direction: column; gap: 0.25rem; }
    .edge-item { font-size: 0.75rem; padding: 0.3rem 0.5rem; border-left: 2px solid var(--border); cursor: pointer; color: var(--muted); }
    .edge-item:hover { border-left-color: var(--accent); color: var(--text); }
    .edge-rel { font-size: 0.65rem; margin-right: 0.4rem; }
    #detail-actions { padding: 0.8rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .act-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.35rem 0.7rem; cursor: pointer; font-family: inherit; font-size: 0.72rem; flex: 1; letter-spacing: 0.05em; }
    .act-btn:hover { border-color: var(--accent); color: var(--accent); }
    .act-btn.danger:hover { border-color: #f87171; color: #f87171; }

    /* ── FAB ── */
    #fab { position: absolute; bottom: 1.5rem; right: 1.5rem; width: 42px; height: 42px; border-radius: 50%; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.15s; }
    #fab:hover { background: var(--accent); color: var(--bg); }

    /* ── Overlays ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 200; }
    .overlay.visible { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); padding: 1.8rem; width: 460px; display: flex; flex-direction: column; gap: 0.9rem; }
    .modal h3 { color: var(--accent); font-size: 0.8rem; letter-spacing: 0.12em; }
    .modal select, .modal input, .modal textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; font-family: inherit; font-size: 0.8rem; width: 100%; outline: none; }
    .modal select:focus, .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal textarea { min-height: 70px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .modal-actions button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.45rem 1.1rem; cursor: pointer; font-family: inherit; font-size: 0.78rem; }
    .modal-actions button.primary { border-color: var(--accent); color: var(--accent); }
    #edge-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.8); border: 1px solid var(--accent); color: var(--accent); padding: 0.6rem 1.4rem; font-size: 0.78rem; letter-spacing: 0.1em; pointer-events: none; display: none; }
  </style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <h1>Epistemic Graph</h1>
  <div id="objects-list"></div>
  <button class="new-btn" onclick="showObjectModal()">+ new research object</button>
</div>

<!-- App -->
<div id="app">
  <div id="topbar">
    <button id="back-btn" onclick="showLanding()">← back</button>
    <div id="obj-name"></div>
    <button class="tab-btn active" id="tab-graph" onclick="switchTab('graph',this)">Graph</button>
    <button class="tab-btn" id="tab-docs" onclick="switchTab('docs',this)">Docs</button>
    <span id="node-count"></span>
  </div>
  <div id="main">
    <div id="graph-container"></div>

    <div id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff9e64"></div>Open Question</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a0c4ff"></div>Provisional Stance</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b9f2a1"></div>Derived Conclusion</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c9b1ff"></div>Imported Tool</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd6a5"></div>Concrete Implication</div>
      <div class="legend-item"><div class="legend-dot" style="background:#89d4cf"></div>Glossary Term</div>
    </div>

    <div id="edge-status">Click second node to connect</div>

    <button id="fab" onclick="showCreateOverlay()" title="New node (N)">+</button>

    <!-- Detail panel -->
    <div id="detail" class="hidden">
      <div id="detail-header">
        <span id="detail-badge"></span>
        <textarea id="detail-title" rows="2" onblur="saveField('title',this.value)"></textarea>
        <button id="detail-close" onclick="closeDetail()">×</button>
      </div>
      <div id="detail-body">
        <div><div class="field-label">Body</div>
        <textarea class="field-val" id="detail-body-text" onblur="saveField('body',this.value)"></textarea></div>
        <div id="detail-meta"></div>
        <div><div class="field-label">Connections</div><div class="edges-list" id="detail-edges"></div></div>
      </div>
      <div id="detail-actions">
        <button class="act-btn" onclick="startEdge()">+ connect</button>
        <button class="act-btn" onclick="flyToSelected()">fly to</button>
        <button class="act-btn danger" onclick="deleteSelected()">delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Create node modal -->
<div class="overlay" id="create-overlay" onclick="if(event.target===this)hideCreateOverlay()">
  <div class="modal">
    <h3>NEW NODE</h3>
    <select id="node-type" onchange="updateMetaInput()">
      <option value="open_question">Open Question</option>
      <option value="provisional_stance">Provisional Stance</option>
      <option value="derived_conclusion">Derived Conclusion</option>
      <option value="imported_tool">Imported Tool</option>
      <option value="concrete_implication">Concrete Implication</option>
      <option value="glossary_term">Glossary Term</option>
    </select>
    <input id="node-title-input" placeholder="Title" />
    <textarea id="node-body-input" placeholder="Body (optional)"></textarea>
    <div id="meta-input-wrap"></div>
    <div class="modal-actions">
      <button onclick="hideCreateOverlay()">cancel</button>
      <button class="primary" onclick="submitCreateNode()">create</button>
    </div>
  </div>
</div>

<!-- New research object modal -->
<div class="overlay" id="obj-modal" onclick="if(event.target===this)hideObjectModal()">
  <form class="modal" onsubmit="submitNewObject(event)">
    <h3>NEW RESEARCH OBJECT</h3>
    <input id="new-obj-name" placeholder="Name" required />
    <textarea id="new-obj-desc" placeholder="One or two sentence description"></textarea>
    <div class="modal-actions">
      <button type="button" onclick="hideObjectModal()">cancel</button>
      <button type="submit" class="primary">create</button>
    </div>
  </form>
</div>

<!-- Edge relationship modal -->
<div class="overlay" id="edge-modal" onclick="if(event.target===this)cancelEdge()">
  <div class="modal">
    <h3>EDGE TYPE</h3>
    <select id="edge-rel-select">
      <option value="supports">supports</option>
      <option value="refutes">refutes</option>
      <option value="depends_on">depends on</option>
      <option value="instantiates">instantiates</option>
      <option value="opens">opens</option>
      <option value="implies">implies</option>
      <option value="defines">defines</option>
    </select>
    <input id="edge-label-input" placeholder="Label (optional)" />
    <div class="modal-actions">
      <button onclick="cancelEdge()">cancel</button>
      <button class="primary" onclick="submitEdge()">create edge</button>
    </div>
  </div>
</div>

<script type="module" src="app3d.js"></script>
</body>
</html>
